services:
  empire-agent:
    image: python:3.12-slim
    container_name: empire-agent
    volumes:
      - .:/app
      - $HOME/.anthropic:/root/.anthropic
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
