<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empire OS Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#18181b;--s2:#1f1f23;--s3:#27272a;
  --border:rgba(255,255,255,.08);--text:#f4f4f5;--ts:#a1a1aa;--tt:#71717a;
  --accent:#6366f1;--a2:#818cf8;--green:#34d399;--gold:#fbbf24;--red:#fb7185;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
input,textarea,select{font-family:inherit}
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);background:rgba(9,9,11,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40;flex-shrink:0}
.body-row{display:flex;flex:1}
.sidebar{width:216px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);background:var(--surface);overflow-y:auto}
.main{flex:1;min-width:0;padding:28px 32px 60px;max-width:1280px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;user-select:none}
.nav-item:hover:not(.active){background:rgba(255,255,255,.04)}
.nav-item.active{background:var(--s2);border-color:var(--border)}
.nav-label{font-size:13px;font-weight:500;color:var(--ts);flex:1;white-space:nowrap}
.nav-item.active .nav-label{font-weight:600;color:var(--text)}
.nav-icon{width:16px;height:16px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:5px}
.badge-ai{color:var(--a2);background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3)}
.badge-new{color:var(--green);background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.eyebrow{font-size:10.5px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.07em}
.stitle{font-size:13px;font-weight:700;color:var(--text)}
.mono{font-family:'JetBrains Mono',monospace}
.btn{font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--text);display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.82}
.btn-primary{background:linear-gradient(135deg,#818cf8,#4f46e5);border-color:transparent;color:#fff}
.btn-green{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);color:var(--green)}
.btn-gold{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:var(--gold)}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:8px}
.slabel{font-size:10.5px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.07em}
.sval{font-size:26px;font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace;letter-spacing:-.01em}
.ssub{font-size:11.5px;font-weight:600}
.arow{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.p-green{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--green)}
.p-red{background:rgba(251,113,133,.15);border:1px solid rgba(251,113,133,.3);color:var(--red)}
.p-gold{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:var(--gold)}
.p-accent{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:var(--a2)}
.mkt-mono{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0a0a10;flex-shrink:0}
.ch-chip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--ts)}
.ch-chip.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:var(--a2)}
.ep-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.prog-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#818cf8,#4f46e5);transition:width .3s}
.rev-bar-wrap{display:flex;align-items:flex-end;flex:1}
.cmd-overlay{position:fixed;inset:0;background:rgba(4,4,8,.72);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:90px}
.cmd-panel{width:560px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.55);overflow:hidden;animation:fadeup .15s ease}
.credits-box{margin-top:auto;padding:14px;border-top:1px solid var(--border)}
.credits-inner{display:flex;flex-direction:column;gap:6px;padding:12px;border-radius:10px;background:linear-gradient(160deg,rgba(139,92,246,.14),rgba(34,211,238,.06));border:1px solid rgba(139,92,246,.22)}
.ptitle{font-size:20px;font-weight:700;color:var(--text)}
.psub{font-size:13px;color:var(--tt);margin-top:3px;margin-bottom:22px}
</style>
</head>
<body>
<div id="app"></div>
<script>

function set(u) { Object.assign(S, u); renderApp(); }

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function nav(p) { set({ page: p, cmdOpen: false }); }
function openCmd() { set({ cmdOpen: true }); }
function closeCmd() { set({ cmdOpen: false }); }
function setChannel(c) { set({ contentChannel: c }); }
function toggleTarget(id) { S.targets[id] = !S.targets[id]; renderApp(); }

async function callPipeline(action, body) {
  try {
    const r = await fetch('http://localhost:8002/api/' + action, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.error) alert('⚠ ' + d.error);
    else alert('✓ ' + (d.message || action + ' started'));
  } catch {
    alert('⚠ Server offline — start empire_server.py first:\n  START_EMPIRE_PIPELINE.bat');
  }
}

function pipelineBtn(label, action, body, cls) {
  const args = JSON.stringify(body).replace(/"/g, '&quot;');
  return `<button class="btn ${cls||''}" onclick='callPipeline("${action}",${JSON.stringify(body)})'>${label}</button>`;
}

  { ep:'GG_EP009', title:'Battle of Hastings',    size:'261MB', dur:'44min', bot10:'pass'    },

const GG_EP = [
  { ep:'EP001',title:'Spartans at Thermopylae',st:'live',sz:'187MB',dur:'39min'},
  { ep:'EP002',title:'Rise of Alexander',      st:'live',sz:'201MB',dur:'42min'},

  { ep:'EP016',title:'Agincourt (S3)',         st:'rendering',sz:'—',dur:'—'},
];

// ── NAV ───────────────────────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard'     },
  { id:'inventory', label:'Inventory'     },
  { id:'editor',    label:'Listing Editor'},

// ── ICON SVGs ─────────────────────────────────────────────────────────────────
function icon(id, active) {
  const c = active ? '#818cf8' : '#71717a';
  const I = {
    dashboard: `<div style="width:10px;height:10px;border-radius:50%;background:${c};"></div>`,

    editor:    `<div style="width:8px;height:8px;background:${c};transform:rotate(45deg);border-radius:2px;"></div>`,
    crosspost: `<div style="position:absolute;width:5px;height:5px;border-radius:50%;background:${c};left:0;top:3px;"></div><div style="position:absolute;width:5px;height:5px;border-radius:50%;background:${c};right:0;top:3px;"></div><div style="position:absolute;width:5px;height:5px;border-radius:50%;background:${c};left:5px;bottom:1px;"></div>`,
    analytics: `<div style="position:absolute;left:0;bottom:0;width:3px;height:7px;border-radius:1px;background:${c};opacity:.55;"></div><div style="position:absolute;left:5px;bottom:0;width:3px;height:13px;border-radius:1px;background:${c};"></div><div style="position:absolute;right:0;bottom:0;width:3px;height:10px;border-radius:1px;background:${c};opacity:.75;"></div>`,
    aicommand: `<div style="width:12px;height:12px;background:${c};clip-path:polygon(50% 0%,62% 38%,100% 50%,62% 62%,50% 100%,38% 62%,0% 50%,38% 38%);"></div>`,
    content:   `<div style="width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid ${c};margin-left:3px;"></div>`,
    books:     `<div style="position:absolute;left:3px;top:1px;width:3px;bottom:1px;background:${c};border-radius:1px 0 0 1px;"></div><div style="position:absolute;left:6px;top:1px;right:0;bottom:1px;border:1.5px solid ${c};border-radius:0 3px 3px 0;border-left:none;"></div>`,
    channels:  `<div style="position:absolute;left:0;top:3px;right:5px;bottom:3px;border:1.5px solid ${c};border-radius:2px;"></div><div style="position:absolute;right:0;top:50%;transform:translateY(-50%);width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:5px solid ${c};"></div>`,

// ── HELPERS ───────────────────────────────────────────────────────────────────
const LOGO = `<div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#a78bfa,#67e8f9);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><div style="width:10px;height:10px;border-radius:3px;background:#0a0a10;transform:rotate(45deg);"></div></div>`;

function revBars(data, h) {
  const mx = Math.max(...data);
  return data.map((v, i) => {
    const pct = Math.round((v / mx) * 100);
    const last = i === data.length - 1;
    return `<div class="rev-bar-wrap" style="height:${h}px;"><div style="width:100%;border-radius:3px 3px 0 0;background:${last ? 'linear-gradient(180deg,#818cf8,#4f46e5)' : 'rgba(99,102,241,.28)'};height:${pct}%;"></div></div>`;
  }).join('');
}

function mktMono(m, sz) {
  sz = sz || 24;
  return `<div class="mkt-mono" style="background:${m.color};width:${sz}px;height:${sz}px;border-radius:${sz===24?6:9}px;font-size:${sz===24?10.5:13}px;">${m.mono}</div>`;
}

// ── PAGE: DASHBOARD ───────────────────────────────────────────────────────────
function pgDashboard() {
  const dotColor = { relist:'#818cf8', gen:'#818cf8', render:'#fbbf24', done:'#34d399', error:'#fb7185' };
  const acts = ACTIVITY.map(a => {
    const dc = dotColor[a.kind] || '#818cf8';
    return `<div class="arow">
      <div style="width:22px;height:22px;border-radius:50%;background:${dc}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
        <div style="width:6px;height:6px;border-radius:50%;background:${dc};"></div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12.5px;color:var(--text);line-height:1.5;">${a.text}</div>
        <div style="font-size:10.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;margin-top:2px;">${a.t}</div>
      </div>
    </div>`;
  }).join('');

  const mktStatus = MARKETS.map(m => {
    const dc = m.status === 'live' ? 'var(--green)' : m.status === 'syncing' ? 'var(--gold)' : 'var(--red)';
    return `<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--s2);border:1px solid var(--border);border-radius:10px;">
      ${mktMono(m)}
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--text);">${m.name.split(' ')[0]}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px;">
          <div style="width:6px;height:6px;border-radius:50%;background:${dc};${m.status==='syncing'?'animation:pulse 1.2s infinite':''}"></div>
          <span style="font-size:10.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;">${m.sync}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="font-size:20px;font-weight:700;">Good morning, Josh</div>
    <div style="font-size:13px;color:var(--tt);margin-top:3px;margin-bottom:22px;">Here's how the empire is performing today.</div>
    <div class="sgrid">
      <div class="scard"><span class="slabel">Revenue (30d)</span><span class="sval">$24,680</span><span class="ssub" style="color:var(--green);">+18.2% vs prior</span></div>
      <div class="scard"><span class="slabel">Active Listings</span><span class="sval">1,299</span><span class="ssub" style="color:var(--tt);">6 marketplaces</span></div>
      <div class="scard"><span class="slabel">GG Episodes Live</span><span class="sval">11</span><span class="ssub" style="color:var(--a2);">S3 rendering now</span></div>
      <div class="scard"><span class="slabel">Pending Upload</span><span class="sval">4</span><span class="ssub" style="color:var(--gold);">manual approval req.</span></div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <span class="stitle">Revenue — Last 12 Weeks</span>
          <span style="font-size:11px;color:var(--green);font-weight:700;font-family:'JetBrains Mono',monospace;">+18.2%</span>
        </div>
        <div style="display:flex;align-items:flex-end;gap:6px;">${revBars(REV, 120)}</div>
      </div>
      <div class="card">
        <div class="eyebrow" style="margin-bottom:12px;">Marketplace Status</div>
        <div style="display:flex;flex-direction:column;gap:8px;">${mktStatus}</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <span class="stitle">Empire Activity Feed</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;"></div>
          <span style="font-size:10.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;">LIVE</span>
        </div>
      </div>
      ${acts}
    </div>`;
}

// ── PAGE: INVENTORY ───────────────────────────────────────────────────────────
function pgInventory() {
  const rows = INV.map(r => {
    const sc = r.score >= 90 ? 'var(--green)' : r.score >= 70 ? 'var(--a2)' : 'var(--gold)';

          <div class="eyebrow" style="margin-bottom:12px;">Integration Status</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:600;">Gemini API</span><span class="pill p-green">✓ Connected</span></div>
            <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:600;">Draft2Digital</span><span class="pill p-red">Add D2D_API_KEY</span></div>
            <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:600;">EbookLib</span><span class="pill p-gold">pip install needed</span></div>
          </div>
        </div>
        <div class="card">
          <div class="eyebrow" style="margin-bottom:8px;">StoryForge</div>
          <div style="font-size:12.5px;color:var(--ts);line-height:1.6;margin-bottom:12px;">Book generation system built into Empire OS. Topic → Outline → Chapters → EPUB, all with Gemini.</div>
          <div style="font-size:11px;color:var(--tt);margin-bottom:8px;">Install deps first:</div>
          <div style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--a2);">pip install google-generativeai ebooklib requests --break-system-packages</div>
        </div>
        <div class="card">
          <div class="eyebrow" style="margin-bottom:8px;">D2D Setup</div>
          <div style="font-size:12px;color:var(--ts);line-height:1.6;">Sign up at draft2digital.com ($20/mo), then add <span style="color:var(--a2);font-family:'JetBrains Mono',monospace;">D2D_API_KEY</span> to your <span style="color:var(--a2);font-family:'JetBrains Mono',monospace;">.env</span> file.</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="stitle" style="margin-bottom:16px;">Books in Pipeline</div>
      <div style="text-align:center;padding:40px 20px;color:var(--tt);font-size:13px;">No books yet — enter a topic above and click Generate to start your first book.</div>
    </div>`;
}

// ── PAGE: CHANNELS ────────────────────────────────────────────────────────────
function pgChannels() {
  const chCards = Object.entries(CHANNELS).map(([id, c]) => {
    const tb = c.token==='ok'
      ? '<span class="pill p-green">✓ Token valid</span>'
      : c.token==='warn'
      ? '<span class="pill p-gold">⚠ Re-auth needed</span>'
      : '<span class="pill p-red">Not set up</span>';
    return `<div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:8px;">
      <div style="width:40px;height:40px;border-radius:10px;background:${c.color}22;border:1px solid ${c.color}44;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${c.color};font-family:'JetBrains Mono',monospace;flex-shrink:0;">${id}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13.5px;font-weight:700;">${c.name}</div>
        <div style="font-size:11.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;">${c.handle}</div>
      </div>
      ${tb}
      <span style="font-size:11.5px;color:var(--tt);">${c.ep} ep</span>
    </div>`;
  }).join('');

  const epRows = GG_EP.map(ep => {
    const badge = ep.st==='live'
      ? '<span class="pill p-green">✓ Live</span>'
      : ep.st==='rendering'
      ? '<span class="pill p-gold">Rendering</span>'
      : '<span class="pill p-accent">Ready</span>';
    return `<div class="ep-row">
      <div style="font-size:10.5px;font-weight:700;color:var(--tt);font-family:'JetBrains Mono',monospace;width:44px;flex-shrink:0;">${ep.ep}</div>
      <div style="flex:1;font-size:12.5px;font-weight:600;">${ep.title}</div>
      <div style="font-size:10.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;">${ep.sz} · ${ep.dur}</div>
      ${badge}
    </div>`;
  }).join('');

  return `
    <div class="ptitle">YouTube Channels</div>
    <div class="psub">Token status, episode tracking, and upload queue</div>
    <div style="margin-bottom:16px;">${chCards}</div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px;">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div class="stitle">Gods & Glory Episodes</div>
          <span class="pill p-green">${GG_EP.filter(e=>e.st==='live').length} live</span>
        </div>
        <div style="font-size:11px;color:var(--tt);margin-bottom:12px;font-family:'JetBrains Mono',monospace;">@GodsAndGloryAI · token_gg.pickle</div>
        <div style="background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--red);margin-bottom:12px;">⚠ token_gg.pickle was committed to git — credentials are public. Rotate now in Google Cloud Console.</div>
        ${epRows}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card">
          <div class="stitle" style="margin-bottom:4px;">S3 Render Progress</div>
          <div style="font-size:11px;color:var(--tt);margin-bottom:12px;">EP012–EP025 · 14 scripts ready</div>
          <div class="prog-bar" style="margin-bottom:8px;"><div class="prog-fill" style="width:14%;"></div></div>
          <div style="font-size:11.5px;color:var(--tt);font-family:'JetBrains Mono',monospace;">2 / 14 episodes rendered</div>
          <div style="font-size:11px;color:var(--a2);margin-top:8px;">Run RENDER_S3_ALL.bat to continue</div>
        </div>
        <div class="card">
          <div class="stitle" style="margin-bottom:12px;">Quick Actions</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button class="btn" style="justify-content:flex-start;" onclick="alert('Run: python channel_uploader.py --reauth --channel GG\\n\\nThis will open a Google OAuth flow.')">🔑 Re-auth GG Token</button>
            <button class="btn" style="justify-content:flex-start;" onclick="alert('Run: python council\\\\bots\\\\bot_10_frame_inspector.py --channel GG')">🔍 Run Bot-10 QC Check</button>
            <button class="btn btn-primary" style="justify-content:flex-start;" onclick="alert('YouTube upload requires manual approval.\\n\\nRun: python channel_uploader.py --episode GG_EP008 --channel GG --verify')">📤 Upload EP008 to YouTube</button>
          </div>
        </div>
        <div class="card">
          <div class="eyebrow" style="margin-bottom:8px;">Social Funnels</div>
          <div style="font-size:12px;color:var(--ts);line-height:1.6;margin-bottom:10px;">YouTube = main channel. Instagram/TikTok/Facebook/X/Pinterest = 60-sec vertical clips that drive traffic to YouTube.</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${['YT','IG','TK','FB','X','Pin'].map(p=>`<div style="font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--s3);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;color:var(--ts);">${p}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

// ── COMMAND PALETTE ───────────────────────────────────────────────────────────
function renderCmd() {
  if (!S.cmdOpen) return '';
  const sug = [
    { label:'Render GG_EP017',       tag:'Content',   page:'content'   },
    { label:'Check upload queue',    tag:'Channels',  page:'channels'  },
    { label:'Relist stale inventory',tag:'Crosspost', page:'crosspost' },
    { label:"Today's profit",        tag:'Analytics', page:'analytics' },
    { label:'Generate new book',     tag:'Books',     page:'books'     },
  ].map(s => `<div onclick="nav('${s.page}')" style="display:flex;align-items:center;gap:11px;padding:10px;border-radius:9px;cursor:pointer;" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='transparent'">
    <div style="width:26px;height:26px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--a2);">✦</div>
    <span style="font-size:13px;flex:1;">${s.label}</span>
    <span style="font-size:10.5px;color:var(--tt);">${s.tag}</span>
  </div>`).join('');
  return `<div class="cmd-overlay" onclick="closeCmd()">
    <div class="cmd-panel" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);">
        <div style="width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--a2));flex-shrink:0;box-shadow:0 0 14px rgba(139,92,246,.5);"></div>
        <input id="cmd-i" value="${S.cmdQuery}" oninput="S.cmdQuery=this.value" onkeydown="if(event.key==='Escape')closeCmd()" placeholder="Tell Empire OS AI what to do…" style="flex:1;background:transparent;border:none;outline:none;color:var(--text);font:500 15px Inter,sans-serif;"/>
        <span style="font:500 10px/1 'JetBrains Mono',monospace;color:var(--tt);background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:4px 6px;">ESC</span>
      </div>
      <div style="padding:10px;max-height:400px;overflow:auto;">
        <div class="eyebrow" style="padding:8px 8px 6px;">Suggested</div>
        ${sug}
      </div>
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
const PAGES = {
  dashboard: pgDashboard,
  inventory: pgInventory,
  editor:    pgEditor,
  crosspost: pgCrosspost,
  analytics: pgAnalytics,
  aicommand: pgAiCommand,
  content:   pgContent,
  books:     pgBooks,
  channels:  pgChannels,
};

function renderApp() {
  const p = S.page;
  const navHtml = NAV.map(n => {
    const a = p === n.id;
    return `<div class="nav-item${a?' active':''}" onclick="nav('${n.id}')">
      ${icon(n.id, a)}
      <span class="nav-label">${n.label}</span>
      ${n.badge ? `<span class="badge ${n.badgeCls}">${n.badge}</span>` : ''}
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0;">
        ${LOGO}
        <div style="display:flex;align-items:baseline;gap:5px;white-space:nowrap;">
          <span style="font-size:14.5px;font-weight:700;letter-spacing:-.01em;">Empire OS</span>
          <span style="font-size:14.5px;font-weight:500;color:var(--tt);">Hub</span>
        </div>
      </div>
      <div onclick="openCmd()" style="flex:1;max-width:420px;display:flex;align-items:center;gap:9px;height:36px;padding:0 12px;background:var(--s2);border:1px solid var(--border);border-radius:9px;cursor:pointer;color:var(--tt);">
        <div style="width:12px;height:12px;border-radius:50%;border:1.6px solid var(--tt);position:relative;flex-shrink:0;"><div style="position:absolute;width:1.6px;height:6px;background:var(--tt);right:-3px;bottom:-3px;transform:rotate(45deg);"></div></div>
        <span style="font-size:12.5px;flex:1;">Ask Empire OS AI or search…</span>
        <div style="display:flex;gap:3px;">
          <span style="font:500 10px/1 'JetBrains Mono',monospace;color:var(--tt);background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:3px 5px;">⌘</span>
          <span style="font:500 10px/1 'JetBrains Mono',monospace;color:var(--tt);background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:3px 5px;">K</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <div style="width:1px;height:20px;background:var(--border);"></div>
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#67e8f9);display:flex;align-items:center;justify-content:center;font:700 12px Inter,sans-serif;color:#0a0a10;flex-shrink:0;">JJ</div>
      </div>
    </div>
    <div class="body-row">
      <div class="sidebar">
        <div style="padding:14px 10px;">${navHtml}</div>
        <div class="credits-box">
          <div class="credits-inner">
            <span style="font-size:11.5px;font-weight:600;">AI Credits</span>
            <span style="font-size:10.5px;color:var(--tt);">2,840 / 5,000 used this month</span>
            <div class="prog-bar" style="margin-top:2px;"><div class="prog-fill" style="width:57%;"></div></div>
          </div>
        </div>
      </div>
      <div class="main">${(PAGES[p]||pgDashboard)()}</div>
    </div>
    ${renderCmd()}`;

  if (S.cmdOpen) {
    const ci = document.getElementById('cmd-i');
    if (ci) setTimeout(() => ci.focus(), 0);
  }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmd(); }
  if (e.key === 'Escape' && S.cmdOpen) closeCmd();
});

renderApp();
</script>
</body>
</html>
